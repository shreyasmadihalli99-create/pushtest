<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hotel Pushkar - Premium Menu</title>
    <style>
        :root {
            --primary: #e5990d; --accent: #ff9800; --bg: #fffbf5;
            --text: #333; --white: #ffffff; --gray: #f4f4f4;
            --success: #27ae60; --danger: #e74c3c;
        }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 0; }
        
        /* --- SECRET ADMIN STAR --- */
        #admin-star {
            position: fixed; bottom: 20px; right: 20px; z-index: 9999;
            font-size: 20px; opacity: 0.05; background: white;
            width: 45px; height: 45px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center; cursor: pointer;
        }

        #admin-panel {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: white; z-index: 10000; padding: 20px; overflow-y: auto; box-sizing: border-box;
        }

        /* --- HERO SECTION --- */
        #hero-page {
            height: 100vh; width: 100%;
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('https://images.unsplash.com/photo-1585937421612-70a008356fbe?auto=format&fit=crop&w=1500&q=80');
            background-size: cover; background-position: center;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            text-align: center; color: white; position: fixed; top: 0; left: 0; z-index: 3000;
            transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }
        #hero-page.hidden { transform: translateY(-100%); }

        .explore-btn {
            margin-top: 25px; background: var(--accent); color: white;
            padding: 15px 45px; font-size: 1.3rem; font-weight: bold;
            border: none; border-radius: 50px; cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        /* --- MENU SECTION --- */
        #menu-page { display: none; max-width: 900px; margin: 0 auto; padding-bottom: 450px; }
        
        .tabs-container { 
            position: sticky; top: 0; background: white; display: flex; 
            overflow-x: auto; padding: 15px; gap: 12px; z-index: 1000; 
            box-shadow: 0 2px 15px rgba(0,0,0,0.1); scrollbar-width: none; 
        }
        .tabs-container::-webkit-scrollbar { display: none; }
        
        .tab-btn { 
            background: var(--gray); border: none; padding: 12px 25px; 
            border-radius: 30px; white-space: nowrap; font-weight: 600; cursor: pointer; 
            transition: 0.3s;
        }
        .tab-btn.active { background: var(--primary); color: white; transform: scale(1.05); }

        .category-header { padding: 20px 15px 10px; font-size: 1.5rem; color: var(--primary); border-bottom: 2px solid var(--accent); margin: 10px 15px; }

        .menu-item { 
            display: flex; justify-content: space-between; align-items: center; 
            background: white; padding: 18px; margin: 12px 15px; 
            border-radius: 15px; box-shadow: 0 3px 10px rgba(0,0,0,0.08); 
        }
        
        .item-info { flex: 1; }
        .item-name { font-weight: 700; font-size: 1.05rem; display: block; }
        .item-price { color: var(--primary); font-weight: 800; margin-top: 5px; display: block; }

        .qty-box { display: flex; align-items: center; gap: 12px; background: var(--gray); padding: 6px 10px; border-radius: 25px; }
        .qty-btn { background: var(--primary); color: white; border: none; width: 30px; height: 30px; border-radius: 50%; cursor: pointer; font-weight: bold; font-size: 1.2rem; }

        /* --- FOOTER POPUP --- */
        .cart-popup {
            position: fixed; bottom: 0; left: 50%; transform: translateX(-50%) translateY(100%);
            width: 100%; max-width: 550px; background: white; border-top-left-radius: 30px; border-top-right-radius: 30px;
            padding: 25px; transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            z-index: 4000; box-sizing: border-box; box-shadow: 0 -10px 30px rgba(0,0,0,0.2);
        }
        .cart-popup.active { transform: translateX(-50%) translateY(0); }

        .delivery-input { 
            width: 100%; padding: 14px; margin-bottom: 12px; border: 2px solid #f0f0f0; 
            border-radius: 12px; outline: none; box-sizing: border-box; font-size: 1rem;
            transition: border 0.3s;
        }
        .delivery-input:focus { border-color: var(--primary); }

        .loc-btn { 
            background: #2196F3; color: white; border: none; padding: 15px; 
            width: 100%; border-radius: 12px; font-weight: bold; cursor: pointer; 
            margin-bottom: 15px; font-size: 1rem;
        }

        .confirm-btn { 
            background: #2e7d32; color: white; border: none; padding: 18px; 
            width: 100%; border-radius: 15px; font-weight: 900; font-size: 1.2rem; 
            display: none; cursor: pointer; text-transform: uppercase; letter-spacing: 1px;
        }

        #success-screen { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 9999; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
    </style>
</head>
<body>

    <div id="admin-star" onclick="openAdmin()">★</div>

    <div id="admin-panel">
        <div style="display:flex; justify-content:space-between; align-items:center; padding-bottom:15px; border-bottom: 1px solid #ddd;">
            <h2 style="margin:0;">Pushkar Admin Panel</h2>
            <button onclick="document.getElementById('admin-panel').style.display='none'" style="padding:10px 20px; background:#333; color:white; border:none; border-radius:8px;">EXIT</button>
        </div>
        <div id="admin-list"></div>
    </div>

    <div id="success-screen">
        <div style="background: #e8f5e9; width: 100px; height: 100px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin-bottom: 20px;">
            <span style="color: #2e7d32; font-size: 3rem;">✔</span>
        </div>
        <h2 style="margin:0;">ORDER SENT!</h2>
        <p style="color:#666;">Hotel Pushkar is checking your order.</p>
        <button class="explore-btn" onclick="location.reload()">New Order</button>
    </div>

    <section id="hero-page">
        <h1 style="font-size: 3rem; margin: 0; letter-spacing: 2px;">HOTEL PUSHKAR</h1>
        <p style="font-size: 1.2rem; margin-top: 10px; opacity: 0.9;">"Cooked With Passion, Served By Soul!"</p>
        <div style="height:2px; width:60px; background:var(--accent); margin: 20px 0;"></div>
        <p style="font-size: 1rem;">Pure Veg Family Restaurant | Hukkeri</p>
        <button class="explore-btn" onclick="openMenu()">View Full Menu</button>
    </section>

    <main id="menu-page">
        <div class="tabs-container" id="tabs"></div>
        <div style="padding:15px;"><img id="cat-banner" style="width:100%; height:220px; object-fit:cover; border-radius:20px; box-shadow: 0 5px 15px rgba(0,0,0,0.1);" src=""></div>
        
        <h2 id="cat-title" class="category-header"></h2>
        <div id="items-container"></div>

        <div class="cart-popup" id="cart-popup">
            <div style="font-weight:bold; margin-bottom:15px; font-size: 1.1rem; border-bottom: 1px solid #eee; padding-bottom: 10px;">Finalize Your Order</div>
            
            <input type="text" id="cust-name" class="delivery-input" placeholder="Your Full Name (Letters Only)" oninput="this.value = this.value.replace(/[^a-zA-Z\s]/g, '')">
            <input type="tel" id="cust-phone" class="delivery-input" placeholder="10-Digit Mobile Number" maxlength="10" oninput="this.value = this.value.replace(/[^0-9]/g, '')">
            
            <button class="loc-btn" id="loc-btn" onclick="getGPS()">📍 Tap to Share Delivery Location</button>
            
            <div id="cart-summary" style="max-height: 120px; overflow-y: auto; font-size: 0.95rem; margin-bottom: 15px; padding: 10px; background: #fafafa; border-radius: 10px;"></div>
            
            <div style="border-top: 1px dashed #ccc; padding: 10px 0; font-size: 0.9rem; color: #777;">
                <div style="display:flex; justify-content:space-between; margin-bottom:5px;"><span>Convenience Fee</span><span>₹5</span></div>
                <div style="display:flex; justify-content:space-between;"><span>Delivery Service</span><span>₹10</span></div>
            </div>

            <div style="display:flex; justify-content:space-between; font-weight:900; color:var(--primary); font-size:1.5rem; margin-bottom: 15px;">
                <span>GRAND TOTAL</span><span>₹<span id="grand-total">0</span></span>
            </div>
            
            <button id="confirm-btn" class="confirm-btn" onclick="submitOrder()">Place Order Now</button>
        </div>
    </main>

            {id: "sp5", name: "Veg Manchow Soup (Half)", price: 60}, {id: "sp6", name: "Cream of Mushroom (Full)", price: 90},
            {id: "sp7", name: "Cream of Mushroom (Half)", price: 60}, {id: "sp8", name: "Cream of Palak (Full)", price: 90},
            {id: "sp9", name: "Cream of Veg Soup (Full)", price: 90}, {id: "sp10", name: "Veg Sweet Corn Soup (Full)", price: 90},
            {id: "sp11", name: "Lemon Coriander Soup (Full)", price: 90}, {id: "sp12", name: "Green Salad", price: 70},
            {id: "sp13", name: "Cucumber Salad", price: 70}, {id: "sp14", name: "Tomato Salad", price: 60},
            {id: "sp15", name: "Butter Milk Masala", price: 40}, {id: "sp16", name: "Butter Milk Plain", price: 30},
            {id: "sp17", name: "Sweet Lassi", price: 60}, {id: "sp18", name: "Curd / Curd Vati", price: 20}
        ],
        "Kebabs & Kaju": [
            {id: "k1", name: "Paneer Tikka Dry", price: 210}, {id: "k2", name: "Mushroom Tikka Dry", price: 210}, {id: "k3", name: "Veg Hara-Bhara Kebab", price: 210},
            {id: "k4", name: "Paneer Pahadi Kebab", price: 220}, {id: "k5", name: "Paneer Banjara Kebab", price: 220}, {id: "k6", name: "Paneer Angara Kebab", price: 230},
            {id: "k7", name: "Aloo Tikka Kebab", price: 180}, {id: "k8", name: "Kaju Masala", price: 220}, {id: "k9", name: "Kaju Curry", price: 220},
            {id: "k10", name: "Kaju Kadhai", price: 220}, {id: "k11", name: "Kaju Kolhapuri", price: 220}, {id: "k12", name: "Kaju Paneer Masala", price: 230},
            {id: "k13", name: "Kaju Paneer Kasthuri", price: 240}, {id: "k14", name: "Kaju Panneri Toofani", price: 240}
        ],

            {id: "m1", name: "Paneer Lababdar", price: 250}, {id: "m2", name: "Paneer Makhmali", price: 260}, {id: "m3", name: "Paneer Digari", price: 240},

            {id: "m7", name: "Veg Angeti", price: 240}, {id: "m8", name: "Veg Chatpata", price: 290}, {id: "m9", name: "Pushkar Special Veg", price: 290},
            {id: "m10", name: "Paneer Masala", price: 200}, {id: "m11", name: "Paneer Kolhapuri", price: 210}, {id: "m12", name: "Paneer Kadai", price: 210},
            {id: "m13", name: "Paneer Tawa", price: 210}, {id: "m14", name: "Paneer Handi", price: 220}, {id: "m15", name: "Paneer Tikka Masala", price: 220},
            {id: "m16", name: "Paneer Burji", price: 220}, {id: "m17", name: "Paneer Butter Masala", price: 230}, {id: "m18", name: "Kaju Makhanwala", price: 230},
            {id: "m19", name: "Paneer Makhanwala", price: 230}, {id: "m20", name: "Kaju Butter Masala", price: 230}, {id: "m21", name: "Veg Makhanwala", price: 210}
        ],
        "Veg & Daal": [
            {id: "v1", name: "Mix Veg", price: 170}, {id: "v2", name: "Veg Kolhapuri", price: 180}, {id: "v3", name: "Veg Kadhai", price: 190},
            {id: "v4", name: "Veg Tawa", price: 190}, {id: "v5", name: "Veg Keema", price: 190}, {id: "v6", name: "Veg Maharaja", price: 200},
            {id: "v7", name: "Veg Kofta Curry", price: 220}, {id: "v8", name: "Plain Daal", price: 100}, {id: "v9", name: "Daal Fry", price: 120},
            {id: "v10", name: "Daal Tadka", price: 130}, {id: "v11", name: "Daal Butter Fry", price: 140}, {id: "v12", name: "Lehsuni Palak", price: 170},

            {id: "rn10", name: "Triple Schezwan Rice", price: 210}, {id: "rn11", name: "Pushkar Special Thali", price: 180}
        ],
        "Roti": [
            {id: "rt1", name: "Roti", price: 20}, {id: "rt2", name: "Butter Roti", price: 25}, {id: "rt3", name: "Kulcha", price: 35},
            {id: "rt4", name: "Butter Kulcha", price: 40}, {id: "rt5", name: "Garlic Kulcha", price: 45}, {id: "rt6", name: "Naan", price: 45},
            {id: "rt7", name: "Butter Naan", price: 50}, {id: "rt8", name: "Butter Garlic Naan", price: 55}, {id: "rt9", name: "Aloo Parotha", price: 80},
            {id: "rt10", name: "Paneer Parotha", price: 90}, {id: "rt11", name: "Wheat Roti", price: 25}
        ],
        "Beverages": [
            {id: "b1", name: "Tea", price: 20}, {id: "b2", name: "Coffee", price: 30}, {id: "b3", name: "Black Tea", price: 15},
            {id: "b4", name: "Fresh Lime Soda (Full)", price: 50}, {id: "b5", name: "Fresh Lime Soda (Half)", price: 30}
        ]
    };

    const categoryImages = {
        "Starters": "https://www.spiritofindiapattaya.com/wp-content/uploads/2023/01/Masala-Papad.jpg",
        "Soups & Salads": "https://tse2.mm.bing.net/th/id/OIP.oRISYhUxwpTtPbD-ka6C2gHaEJ?pid=Api&P=0&h=180",
        "Main Course": "https://images.unsplash.com/photo-1585937421612-70a008356fbe?auto=format&fit=crop&w=800&q=80",
        "Rice & Roti": "https://skydecklounge.in/wp-content/uploads/2022/01/Tandoori-Roti-Butter.jpg",
        "Beverages": "https://www.indianhealthyrecipes.com/wp-content/uploads/2023/05/indian-masala-chai-tea.jpg"
    };

    function openAdmin() {
        if(prompt("Enter Admin PIN:") === "20106669") {
            const list = document.getElementById('admin-list'); list.innerHTML = "";
            document.getElementById('admin-panel').style.display = 'block';
            for(let cat in menuData) {
                list.innerHTML += `<div style="background:#f4f4f4; padding:10px; font-weight:bold; margin-top:10px;">${cat}</div>`;
                menuData[cat].forEach(item => {
                    const isOff = disabledItems[item.id];
                    list.innerHTML += `<div style="display:flex; justify-content:space-between; padding:12px; border-bottom:1px solid #eee;">
                        <span>${item.name}</span>
                        <button onclick="toggle('${item.id}', this)" style="background:${isOff?'#e74c3c':'#27ae60'}; color:white; border:none; padding:6px 15px; border-radius:5px;">${isOff?'HIDDEN':'ACTIVE'}</button>
                    </div>`;
                });
            }
        }
    }

    function toggle(id, btn) {
        if(disabledItems[id]) { delete disabledItems[id]; btn.innerText="ACTIVE"; btn.style.background="#27ae60"; }
        else { disabledItems[id]=true; btn.innerText="HIDDEN"; btn.style.background="#e74c3c"; }
        localStorage.setItem('pushkar_status', JSON.stringify(disabledItems));
    }

    function openMenu() {
        document.getElementById('hero-page').classList.add('hidden');
        setTimeout(() => {
            document.getElementById('hero-page').style.display = 'none';
            document.getElementById('menu-page').style.display = 'block';
            renderTabs();
        }, 800);
    }

    function renderTabs() {
        const tabs = document.getElementById('tabs'); tabs.innerHTML = "";
        Object.keys(menuData).forEach((cat, i) => {
            const btn = document.createElement('button');
            btn.className = "tab-btn" + (i===0?" active":""); btn.innerText = cat;
            btn.onclick = (e) => {
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                e.target.classList.add('active'); renderItems(cat);
            };
            tabs.appendChild(btn);
        });
        renderItems(Object.keys(menuData)[0]);
    }

    function renderItems(cat) {
        document.getElementById('cat-title').innerText = cat;
        document.getElementById('cat-banner').src = categoryImages[cat];
        const container = document.getElementById('items-container'); container.innerHTML = "";
        menuData[cat].forEach(item => {
            if(disabledItems[item.id]) return;
            const q = cart[item.id] ? cart[item.id].qty : 0;
            container.innerHTML += `<div class="menu-item">
                <div class="item-info">
                    <span class="item-name">${item.name}</span>
                    <span class="item-price">₹${item.price}</span>
                </div>
                <div class="qty-box">
                    <button class="qty-btn" onclick="updateQty('${item.id}','${item.name}',${item.price},-1)">-</button>
                    <span id="qty-${item.id}" style="font-weight:bold; min-width:20px; text-align:center;">${q}</span>
                    <button class="qty-btn" onclick="updateQty('${item.id}','${item.name}',${item.price},1)">+</button>
                </div>
            </div>`;
        });
    }

    function updateQty(id, name, price, d) {
        if(!cart[id]) cart[id] = {name: name, price: price, qty: 0};
        cart[id].qty += d;
        if(cart[id].qty <= 0) delete cart[id];
        if(document.getElementById('qty-'+id)) document.getElementById('qty-'+id).innerText = cart[id] ? cart[id].qty : 0;
        updateUI();
    }

    function updateUI() {
        let sub = 0, count = 0, list = "";
        for(let id in cart) { 
            count++; 
            sub += (cart[id].qty * cart[id].price); 
            list += `<div style="display:flex; justify-content:space-between; margin-bottom:5px;"><span>${cart[id].name} x ${cart[id].qty}</span><span>₹${cart[id].qty * cart[id].price}</span></div>`; 
        }
        document.getElementById('cart-summary').innerHTML = list || "Your cart is empty";
        document.getElementById('grand-total').innerText = count > 0 ? (sub + 15) : 0;
        document.getElementById('cart-popup').classList.toggle('active', count > 0);
        if(count === 0) resetLoc();
    }

    function getGPS() {
        const btn = document.getElementById('loc-btn'); btn.innerText = "🛰️ ACCESSING GPS...";
        navigator.geolocation.getCurrentPosition((p) => {
            gpsLink = "https://www.google.com/maps?q=" + p.coords.latitude + "," + p.coords.longitude;
            btn.style.display = "none"; document.getElementById('confirm-btn').style.display = "block";
        }, () => { alert("Please enable GPS Location to proceed."); btn.innerText = "📍 Tap to Share Delivery Location"; }, {enableHighAccuracy: true});
    }

    function resetLoc() { gpsLink = ""; document.getElementById('loc-btn').style.display = "block"; document.getElementById('confirm-btn').style.display = "none"; }

    async function submitOrder() {
        const n = document.getElementById('cust-name').value;
        const p = document.getElementById('cust-phone').value;
        if(!n || p.length < 10) return alert("Valid Name and 10-digit Phone are required.");

        const btn = document.getElementById('confirm-btn');
        btn.innerText = "PROCESSING..."; btn.disabled = true;

        let items = ""; for(let id in cart) items += `${cart[id].name}(x${cart[id].qty}), `;

        const data = {
            hotel: "Hotel Pushkar", name: n, phone: p, items: items.slice(0, -2),
            total: "₹" + document.getElementById('grand-total').innerText, location: gpsLink
        };

        try {
            await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify(data), mode: 'no-cors' });
            document.getElementById('success-screen').style.display = "flex";
        } catch(e) { alert("Network Error. Try again."); btn.disabled = false; btn.innerText = "Place Order Now"; }
    }
</script>
</body>
</html>
